<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#E9D7C8;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
.hero{width:100%;line-height:0}
.hero img{width:100%;height:auto;display:block;}
.btns{padding:16px 14px 40px;display:flex;flex-direction:column;gap:12px;background:#E9D7C8;}
.btn{display:flex;align-items:center;background:#F7F0E6;border:1px solid rgba(201,160,80,0.22);border-radius:12px;overflow:hidden;text-decoration:none;min-height:84px;box-shadow:0 2px 10px rgba(61,36,16,0.07);transition:all 0.2s;}
.btn:hover{border-color:rgba(201,160,80,0.5);transform:translateY(-1px);}
.btn-thumb{width:84px;min-width:84px;height:84px;overflow:hidden;flex-shrink:0;border-right:1px solid rgba(201,160,80,0.22);}
.btn-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.btn-body{flex:1;padding:0 16px;display:flex;flex-direction:column;justify-content:center;gap:8px;}
.btn-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-style:italic;color:#C9A050;line-height:1;display:flex;align-items:baseline;gap:5px;}
.btn-title .dk{font-style:normal;font-weight:600;color:#3D2410;}
.btn-deco{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.deco-line{width:30px;height:1px;background:linear-gradient(90deg,rgba(201,160,80,0.15),#C9A050);}
.deco-star{font-size:11px;color:#C9A050;}
.footer{text-align:center;padding:0 0 28px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(61,36,16,0.35);}
</style>
